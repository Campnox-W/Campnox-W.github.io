    <h2>🗓️ 本学期生物信息学学习计划 (Spring 2026)</h2>

    <p><strong>目标</strong>：掌握核心分析工具，能独立处理二代测序数据，并理解常用算法的生物学解释。不写空话，全部落实到具体模块。</p>

    <h3>📚 总纲 · 课程关联</h3>
    <p>参考课程大纲 <em>[citation:4][citation:8]</em> ，本学期内容覆盖：<strong>数据库检索、序列比对、系统发生树、蛋白质结构预测、微生物组分析</strong>。我将以<strong>“实战+原理”</strong>双线推进。</p>

    <h3>📅 阶段里程碑 (月度)</h3>

    <h4>🔹 3月：基础扫盲 & Linux/R 打磨</h4>
    <ul class="task-list">
        <li class="task-list-item"><input type="checkbox" disabled /> <strong>Day 1-7</strong>：搭建本地环境 (WSL2 + Docker + Conda)，熟练使用 <code>grep</code>, <code>awk</code>, <code>sed</code> 处理 FASTA/Q 文件。</li>
        <li class="task-list-item"><input type="checkbox" disabled /> <strong>Day 8-14</strong>：掌握 R 语言 <code>tidyverse</code> 以及 <code>Biostrings</code> 基础；能写脚本批量格式化数据。</li>
        <li class="task-list-item"><input type="checkbox" disabled /> <strong>Day 15-28</strong>：NCBI 数据库高级检索（E-utilities实战）；写一篇博客记录如何用 Python <code>Biopython</code> 抓取基因序列 [citation:4]。</li>
    </ul>

    <h4>🔹 4月：核心算法——序列比对 & 系统发生</h4>
    <table>
        <thead>
            <tr>
                <th>周次</th>
                <th>内容</th>
                <th>产出/检验</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>第5周</td>
                <td><strong>双序列比对</strong>：Needleman-Wunsch (全局) 和 Smith-Waterman (局部) 的手算练习 + 调用 <code>Bio.Align</code></td>
                <td>手写一份动态规划伪代码，标注时间复杂度</td>
            </tr>
            <tr>
                <td>第6周</td>
                <td><strong>BLAST 原理与本地化</strong>：明白E-value、得分矩阵；在服务器上构建自定义BLAST数据库并运行</td>
                <td>用BLAST找同源基因，写一份简易报告</td>
            </tr>
            <tr>
                <td>第7周</td>
                <td><strong>多序列比对与进化树</strong>：ClustalW / MUSCLE 使用；邻接法(NJ) 和 最大似然法(ML) 的概念区别</td>
                <td>用 MEGA 或 IQ-TREE 构建一个冠状病毒刺突蛋白的进化树 [citation:4]</td>
            </tr>
            <tr>
                <td>第8周</td>
                <td><strong>期中复盘</strong>：整理笔记，将3-4月的代码上传至GitHub</td>
                <td>完成一个小而美的 <code>README.md</code> 索引</td>
            </tr>
        </tbody>
    </table>

    <h4>🔹 5月：功能预测 & 高通量数据分析</h4>
    <ul>
        <li><strong>蛋白质结构与功能</strong>：熟悉 UniProt, PDB 数据库；使用 <code>InterProScan</code> 进行结构域注释；掌握同源建模的简单流程 (SWISS-MODEL) [citation:4]。</li>
    </ul>
    <ul>
        <li><strong>转录组差异表达</strong>：从NCBI SRA 下载一个RNA-Seq 小数据集，走通 <code>fastp → HISAT2 → featureCounts → DESeq2</code> 标准流程。重点理解<strong>counts 模型</strong>（负二项分布）与<strong>算法</strong>（多重假设检验校正）的区别。</li>
    </ul>

    <h4>🔹 6月：微生物组 & 期末整合</h4>
    <ul>
        <li><strong>16S rRNA 分析</strong>：使用 QIIME2 或 <code>dada2</code> 处理扩增子数据，生成 OTU 表，计算 Alpha/Beta 多样性 [citation:4]。</li>
        <li><strong>期末项目</strong>：选择感兴趣的病原菌或人体肠道数据，完成从原始数据下载→可视化→生物学解释的全流程，并用 Markdown 写出最终报告（发布在 GitHub Page 上）。</li>
    </ul>

