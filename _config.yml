    <h2>📝 第一堂课笔记：算法(Algorithm) 与 模型(Model) 的区别</h2>

    <p><em>授课时间：2026.02.28  ·  核心概念澄清</em></p>

    <h3>1. 一句话定义</h3>
    <ul>
        <li><strong>算法</strong>：解决问题的<strong>步骤</strong>或<strong>方法</strong>，是计算的过程。—— <em>“怎么做”</em></li>
        <li><strong>模型</strong>：算法在数据上运行后得到的<strong>具体结果</strong>，是固定的参数结构。—— <em>“做成什么”</em></li>
    </ul>

    <h3>2. 类比理解 (法拉利工厂 🏭)</h3>
    <blockquote>
        <p>算法就像工厂里的<strong>机械臂操作流程</strong>（焊接、喷漆、组装的指令）。<br />
        模型就是按照这套流程生产出来的那辆<strong>具体的812 Superfast</strong>——它有确定的引擎排量、轴距和颜色[citation:7]。<br />
        同一个流程可以造出成千上万辆车，每一辆都是<strong>一个模型</strong>；换一条生产线（另一种算法），也能造出不同型号的车。</p>
    </blockquote>

    <h3>3. 机器学习语境下的区分</h3>
    <table>
        <thead>
            <tr>
                <th>维度</th>
                <th>算法 (Algorithm)</th>
                <th>模型 (Model)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>本质</strong></td>
                <td>优化方法 / 求解策略</td>
                <td>参数化表示 / 数学表达</td>
            </tr>
            <tr>
                <td><strong>存在形式</strong></td>
                <td>代码库中的函数 (如 <code>sklearn.ensemble.RandomForestClassifier()</code>)</td>
                <td>训练后保存的 <code>.pkl</code> 文件 或 权重矩阵</td>
            </tr>
            <tr>
                <td><strong>是否依赖数据</strong></td>
                <td>不依赖——算法定义好了如何学习，但还没学</td>
                <td>必须依赖——模型是数据+算法的产物</td>
            </tr>
            <tr>
                <td><strong>可变性</strong></td>
                <td>静态，代码不变</td>
                <td>动态，不同训练集得到不同模型</td>
            </tr>
            <tr>
                <td><strong>举例</strong></td>
                <td>梯度下降法、反向传播、ID3决策树分裂规则</td>
                <td>训练好的VGG16权重、线性回归系数 <code>y=0.8x+2.1</code></td>
            </tr>
        </tbody>
    </table>

    <h3>4. 经典案例：逻辑回归 (Logistic Regression)</h3>
    <p>很多初学者会问：“逻辑回归是算法还是模型？”<br />
    答案是：<strong>它既是算法，也是模型，取决于语境</strong>。[citation:7]</p>
    <ul>
        <li><strong>作为算法</strong>：指用<strong>极大似然估计 + 梯度下降</strong>来求解分类边界的<strong>整套计算流程</strong>。</li>
        <li><strong>作为模型</strong>：训练完成后得到的 <code>P(Y=1|X) = 1/(1+e^{-(θ^T X)})</code> 这个具体的函数，以及已经算好的参数 <code>θ</code> 矩阵。</li>
    </ul>

    <h3>5. 为什么必须区分？—— 沟通效率 & 工程落地</h3>
    <ul>
        <li><strong>调模型</strong>：指的是调整已经训练好的东西的阈值、输出形式，不重新训练。</li>
        <li><strong>调算法</strong>：指的是改变学习率、树的最大深度、迭代停止条件，然后<strong>重新训练</strong>生成新模型。</li>
        <li>在工业界，<strong>算法工程师</strong>开发新方法，<strong>模型</strong>被部署到app里做预测——角色完全不同。</li>
    </ul>
    <blockquote>
        <p>📌 教授总结：<strong>算法是引擎，模型是造出的船；引擎设计决定了船的性能上限，但下水的船才是真正拿来用的东西。</strong></p>
    </blockquote>

