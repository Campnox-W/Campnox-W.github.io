            <li><strong>每周至少2道算法练习</strong>：用Python实现简单生物学算法（如k-mer计数、GC滑动窗口），避免变成“只会调包的分析师”。</li>
            <li><strong>版本控制</strong>：所有作业、脚本、论文笔记都推送到 GitHub 私有仓库，学期末整理后公开部分内容。</li>
